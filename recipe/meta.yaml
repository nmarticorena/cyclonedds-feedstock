{% set name = "cyclonedds" %}
{% set version = "11.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/eclipse-cyclonedds/cyclonedds/archive/{{ version }}.tar.gz
    sha256: c25d46075ad6b5cee564bda9e5f49509e9a6dbb1a8b858e708eb360d335cf973

build:
  number: 0
  skip: true  # [unix]
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cmake
    - maven
    - openjdk
    - ninja
  host:
    - openssl

test:
  commands:
    - if not exist %LIBRARY_PREFIX%\\bin\\ddsc.dll exit 1  # [win]

about:
  home: https://github.com/eclipse-cyclonedds/cyclonedds
  license: EPL-2.0
  license_file: LICENSE
  summary: |
    Eclipse Cyclone DDS

extra:
  recipe-maintainers:
    - nmarticorena
    - Tobias-Fischer
    - seanyen
